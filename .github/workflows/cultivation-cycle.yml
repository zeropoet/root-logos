name: Cultivation Chamber

on:
  push:
    branches: [main]
    paths:
      - content/constitutional-graph.json
      - content/export-packets.json
      - content/*.md
      - cultivation/policy.json
  schedule:
    - cron: "7 14 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: root-logos-cultivation
  cancel-in-progress: false

jobs:
  cultivate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out constitutional source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Run one bounded cultivation cycle
        run: node scripts/cultivate.mjs cycle

      - name: Validate cultivation lineage
        run: node scripts/cultivate.mjs validate

      - name: Validate attractor independence
        run: node scripts/attractors.mjs validate

      - name: Preserve cycle and authorized refactoring
        run: |
          git config user.name "root-logos-cultivator[bot]"
          git config user.email "root-logos-cultivator[bot]@users.noreply.github.com"
          git add cultivation/state.json cultivation/cycles content/constitutional-graph.json
          if git diff --cached --quiet; then
            echo "No cultivation state changed."
            exit 0
          fi
          cycle_id=$(node -e 'const s=require("./cultivation/state.json"); process.stdout.write(s.history.at(-1)?.cultivation_id || "unknown")')
          git commit -m "Cultivate Root Logos (${cycle_id})"
          git push origin HEAD:main
